name: Collect Market Data

on:
  schedule:
    # 매 15분마다 실행 (UTC 기준)
    # 한국시간 = UTC+9, 새벽 시간대도 금 선물 거래되므로 24시간 수집
    - cron: '*/15 * * * *'

  # 수동 실행 버튼 (테스트용)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 파일을 레포에 커밋할 권한

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install yfinance

      - name: data 폴더 생성
        run: mkdir -p data

      - name: 데이터 수집 실행
        run: python collect_data.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: update market data $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git push
