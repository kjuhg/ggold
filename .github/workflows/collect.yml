name: Collect Market Data

on:
  schedule:
    - cron: '*/15 * * * *'   # GitHub 백업용 (cron-job.org가 주로 실행)
  workflow_dispatch:

# 동시 실행 방지 - 이전 실행이 끝날 때까지 대기
concurrency:
  group: collect-data
  cancel-in-progress: false  # 취소 말고 대기

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install yfinance

      - name: data 폴더 생성
        run: mkdir -p data/history

      - name: 데이터 수집 실행
        run: python collect_data.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && exit 0
          git commit -m "data: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git push origin main || (
            git fetch origin main &&
            git reset --soft origin/main &&
            git add data/ &&
            git diff --cached --quiet && exit 0 || true
            git commit -m "data: $(date -u '+%Y-%m-%dT%H:%M:%SZ') (retry)" &&
            git push origin main
          )
